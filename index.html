<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Detective de los Números Perdidos</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

<!-- ===== MENU ===== -->
<div id="menu-screen">
<div class="floating-q">?</div><div class="floating-q">?</div>
<div class="floating-q">?</div><div class="floating-q">?</div>
<div class="menu-container">
<img src="interfase/titulo.png" alt="Detective de los Números" class="menu-title-img">

<div class="divider-line"></div>
<div class="robot-container"><img src="interfase/NIÑA LUPA.png" alt="Niña detective"></div>
<div class="challenges">
<button class="challenge-btn active" data-challenge="1">
<span class="btn-num">1</span>
<span class="btn-info">
<span class="btn-text">DESAFÍO DE LA GRILLA NUMÉRICA</span>
<span class="btn-desc">La grilla numérica</span>
</span>
</button>
<button class="challenge-btn active" data-challenge="2">
<span class="btn-num">2</span>
<span class="btn-info">
<span class="btn-text">DESCUBRE EL PATRÓN</span>
<span class="btn-desc">Descubre el patrón</span>
</span>
</button>
<button class="challenge-btn active" data-challenge="3">
<span class="btn-num">3</span>
<span class="btn-info">
<span class="btn-text">DESCUBRE EL NÚMERO QUE FALTA</span>
<span class="btn-desc">El reto del detective</span>
</span>
</button>
 </div>
<img src="interfase/texto.png" alt="Texto" class="menu-text-img">
<img src="interfase/logo primaria.svg" alt="Logo Primaria" class="menu-logo-img">
<div class="menu-footer-text">© 2026 — Detective de los Números</div>
</div>
</div>

<!-- ===== GAME ===== -->
<div id="game-screen">
<div class="floating-q">?</div><div class="floating-q">?</div>
<div class="floating-q">?</div><div class="floating-q">?</div>
<div class="game-card">
<div class="game-header">
<div class="header-left">
<button class="back-btn" id="back-to-menu">🏠 VOLVER</button>
<div><div class="game-title">Detective de los Números <span class="game-level-badge" id="game-badge">DESAFÍO DE LA GRILLA NUMÉRICA</span></div></div>
</div>
<div class="stars-display">⭐ <span id="star-count">0</span></div>
</div>

<div class="timer-section">
<div class="total-timer-row">
<span class="timer-icon">📊</span>
<span class="total-time-text">Progreso</span>
<div class="timer-bar-track"><div class="timer-bar-fill" id="progress-bar"></div></div>
<span class="challenge-progress" id="challenge-progress">0/10</span>
</div>
<div class="q-timer-row">
<span class="q-timer-label">⏱ Tiempo restante:</span>
<span class="q-timer-text" id="q-timer-text">⏱ 30s</span>
</div>
</div>

<div id="game-card-content">
<div id="challenge-area"></div>
<div id="question">¿QUÉ NÚMERO FALTA?</div>
<div id="options"></div>
<div id="hint"></div>
<div id="result"></div>
</div>

<div id="end-screen" class="hidden">
<div class="end-bg"></div>
<div class="end-content">
<div class="end-badge" id="end-icon">🏆</div>
<div class="end-medal" id="end-medal">🥇</div>
<div class="end-title" id="end-title">¡JUEGO COMPLETADO!</div>
<div class="end-sub" id="end-sub">Completaste todos los desafíos</div>
<div class="end-stars-row" id="end-stars-container"></div>
<div class="end-stat" id="end-stat">⭐ 10 / 10 respuestas correctas</div>
<div class="end-btn-group">
<button class="end-btn secondary" id="end-replay-btn">🔄 JUGAR DE NUEVO</button>
<button class="end-btn primary" id="end-back-btn">🏠 VOLVER AL MENÚ</button>
</div>
</div>
</div>
</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
